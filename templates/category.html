<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ shelf.name }} - LibFlix</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body { background: #141414; color: #fff; font-family: 'Helvetica Neue', Arial, sans-serif; }
    .navbar { background: linear-gradient(180deg, rgba(20,20,20,.9) 0, rgba(20,20,20,.5) 80%, transparent); z-index: 10; min-height: 48px; }
    .navbar-brand { font-size: 1.3rem; font-weight: 700; color: #e50914 !important; letter-spacing: -1px; }
    .search-bar { min-width: 0; }
    .search-bar input { background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.2); color: #fff; border-radius: 4px; font-size: .82rem; padding: 4px 8px; height: 30px; }
    .search-bar input:focus { background: rgba(255,255,255,.15); border-color: #e50914; box-shadow: none; color: #fff; }
    .search-bar input::placeholder { color: rgba(255,255,255,.4); font-size: .78rem; }
    .search-bar button { background: #e50914; border: none; border-radius: 4px; white-space: nowrap; }
    .search-bar button:hover { background: #f40612; }

    .mode-toggle { display: flex; background: rgba(255,255,255,.08); border-radius: 20px; padding: 1px; }
    .mode-btn { padding: 2px 10px; border-radius: 18px; font-size: .7rem; color: #aaa; text-decoration: none; white-space: nowrap; transition: all .15s; }
    .mode-btn.active { background: #e50914; color: #fff; }
    .cat-tabs::-webkit-scrollbar { display: none; }
    .cat-tab { flex-shrink: 0; padding: 2px 10px; border-radius: 20px; font-size: .75rem; color: #aaa; text-decoration: none; transition: all .15s; white-space: nowrap; }
    .cat-tab:hover { background: rgba(255,255,255,.1); color: #fff; }
    .cat-tab.active { background: #e50914; color: #fff; }

    .page-title { font-size: 1.6rem; font-weight: 700; padding: 1.5rem 1rem .6rem; }

    .book-grid { display: flex; flex-wrap: wrap; gap: 8px; padding: 4px 1rem 2rem; justify-content: center; }
    .book-card { width: 150px; cursor: pointer; transition: transform .2s ease, box-shadow .2s ease; position: relative; border-radius: 8px; overflow: hidden; background:#242424; box-shadow: 0 8px 22px rgba(0,0,0,.18); }
    .book-card:hover { transform: scale(1.06); z-index: 5; box-shadow: 0 18px 42px rgba(0,0,0,.46); }
    .book-card img { width: 150px; height: 225px; object-fit: cover; border-radius: 8px; display: block; background: #333; opacity: 0; transition: opacity .22s ease; position: relative; z-index: 2; }
    .book-card img.loaded { opacity: 1; }
    .book-card .cover-skeleton { position:absolute; inset:0; background: linear-gradient(110deg,#232323 8%,#303030 18%,#232323 33%); background-size: 200% 100%; animation: coverShimmer 1.15s linear infinite; z-index: 0; }
    @keyframes coverShimmer { to { background-position-x: -200%; } }
    .book-card .info { position: absolute; bottom: 0; left: 0; right: 0; padding: 58px 10px 10px; background: linear-gradient(180deg, transparent 0%, rgba(4,5,8,.45) 38%, rgba(4,5,8,.9) 74%, rgba(4,5,8,.98) 100%); opacity: 0; transform: translateY(10px); transition: opacity .18s ease, transform .18s ease; z-index: 3; text-shadow: 0 1px 3px rgba(0,0,0,.78); }
    .book-card:hover .info, a:focus-visible .book-card .info { opacity: 1; transform: translateY(0); }
    .book-card .info .t { font-size: .82rem; font-weight: 700; line-height: 1.12; color: #fff; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .book-card .info .a { font-size: .7rem; font-weight: 500; color: rgba(255,255,255,.76); margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .book-card .placeholder { width: 150px; height: 225px; background: #2a2a2a; display: flex; align-items: center; justify-content: center; font-size: 2rem; color: #555; border-radius: 8px; position: relative; z-index: 2; }

    .loading-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #141414; z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; }
    .loading-overlay .spinner { width: 50px; height: 50px; border: 4px solid rgba(229,9,20,.2); border-top-color: #e50914; border-radius: 50%; animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .inf-loading { text-align: center; padding: 1.5rem; color: #666; display: none; }
    .inf-loading .spinner-sm { width: 28px; height: 28px; border: 3px solid rgba(229,9,20,.2); border-top-color: #e50914; border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto; }
    .scroll-sentinel { height: 1px; }

    @media (max-width: 768px) {
      .book-card, .book-card img { width: 120px; }
      .book-card img { height: 180px; }
      .book-card .placeholder { width: 120px; height: 180px; }
      .cat-tab { font-size: .65rem; padding: 2px 6px; }
    }
    @media (max-width: 992px) {
      .cat-tab { font-size: .7rem; padding: 2px 8px; }
    }
  </style>
</head>
<body>
  {% set active_tab = topic %}
  {% include "_navbar.html" %}

  <div class="page-title">{{ shelf.name }}</div>

  <div class="book-grid" id="bookGrid">
    {% for book in shelf.books %}
    {% include "_book_card.html" %}
    {% endfor %}
  </div>
  {% if not shelf.books %}
  <div style="text-align:center;padding:1rem 3rem 2rem;color:#666;font-style:italic" id="emptyState">No books loaded yet.</div>
  {% endif %}

  <div id="scrollSentinel" class="scroll-sentinel" aria-hidden="true"></div>
  <div class="inf-loading" id="infLoading">
    <div class="spinner-sm"></div>
  </div>

  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
  </div>

  <footer class="text-center text-muted py-4 small">
    Powered by Open Library &amp; libgen.li
  </footer>

  <script>
    const TOPIC = {{ topic | tojson }};
    const MODE = {{ mode | tojson if mode else 'nonfiction' | tojson }};
    const BOOK_LANG = {{ book_lang | tojson }};
    let currentPage = 1;
    let totalPages = Infinity;
    let loading = false;
    let finished = false;
    const scrollSentinel = document.getElementById('scrollSentinel');
    const infLoading = document.getElementById('infLoading');

    document.getElementById('loadingOverlay').style.display = 'none';
    document.querySelectorAll('a[href^="/search"], a[href^="/preview"], a[href*="/book/"]').forEach(a => {
      a.addEventListener('click', function() {
        document.getElementById('loadingOverlay').style.display = 'flex';
      });
    });

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s || '';
      return d.innerHTML;
    }

    function bookUrl(book) {
      const key = (book.ol_key || '').replace(/^\/?works\//, '');
      if (!key) return '/preview';
      const prefix = (MODE === 'fiction' ? '/fiction' : '') + (BOOK_LANG === 'cn' ? '/cn' : '');
      return (prefix || '') + '/book/' + encodeURIComponent(key);
    }

    function renderBooks(books) {
      const grid = document.getElementById('bookGrid');
      const emptyState = document.getElementById('emptyState');
      if (emptyState) emptyState.style.display = 'none';
      for (const b of books) {
        const href = bookUrl(b);
        const card = document.createElement('a');
        card.href = href;
        card.className = 'text-decoration-none';
        const imgFallback = 'this.style.display=\'none\';this.parentNode.querySelector(\'.ph-fallback\').style.display=\'flex\';';
        card.innerHTML = '<div class="book-card" data-ol-key="' + esc(b.ol_key || '') + '" data-title="' + esc(b.title || '') + '" data-author="' + esc(b.author || '') + '">' +
          (b.cover_url ? '<div class="cover-skeleton"></div><img src="' + esc(b.cover_url) + '" alt="' + esc(b.title) + '" loading="lazy" decoding="async" referrerpolicy="no-referrer" onload="this.classList.add(\'loaded\')" onerror="' + imgFallback + '"><div class="placeholder ph-fallback" style="display:none">?</div>' : '<div class="placeholder">?</div>') +
          '<div class="info"><div class="t">' + (b.title.length > 50 ? esc(b.title.slice(0,50)) + '...' : esc(b.title)) + '</div>' +
          (b.author ? '<div class="a">' + (b.author.length > 35 ? esc(b.author.slice(0,35)) + '...' : esc(b.author)) + '</div>' : '') +
          '</div></div>';
        grid.appendChild(card);
      }
    }

    function setLoading(on) {
      infLoading.style.display = on ? 'block' : 'none';
    }

    function finishLoading() {
      finished = true;
      if (scrollSentinel) scrollSentinel.style.display = 'none';
    }

    function loadMore() {
      if (loading || finished || currentPage >= totalPages) return;
      loading = true;
      setLoading(true);
      const nextPage = currentPage + 1;
      fetch('/api/category/' + encodeURIComponent(TOPIC) + '?page=' + nextPage + '&mode=' + encodeURIComponent(MODE) + '&book_lang=' + encodeURIComponent(BOOK_LANG))
        .then(r => r.json())
        .then(data => {
          if (!data.success || !data.books.length) {
            totalPages = nextPage;
            finishLoading();
            return;
          }
          renderBooks(data.books);
          currentPage = data.page || nextPage;
          totalPages = data.total_pages || totalPages;
          if (currentPage >= totalPages) finishLoading();
        })
        .catch(() => {})
        .finally(() => {
          loading = false;
          setLoading(false);
          fillViewportIfNeeded();
        });
    }

    function nearPageBottom() {
      return window.innerHeight + window.scrollY >= document.documentElement.scrollHeight - 700;
    }

    function maybeLoadMore() {
      if (nearPageBottom()) loadMore();
    }

    function fillViewportIfNeeded() {
      if (!finished && document.documentElement.scrollHeight <= window.innerHeight + 120) {
        loadMore();
      }
    }

    if ('IntersectionObserver' in window && scrollSentinel) {
      const observer = new IntersectionObserver(entries => {
        if (entries.some(entry => entry.isIntersecting)) loadMore();
      }, { rootMargin: '700px 0px' });
      observer.observe(scrollSentinel);
    }

    window.addEventListener('scroll', maybeLoadMore, { passive: true });
    window.addEventListener('resize', fillViewportIfNeeded);
    setTimeout(fillViewportIfNeeded, 250);
  </script>
</body>
</html>
