<a href="{{ book_url(book, mode | default('nonfiction'), book_lang) }}" class="book-card-link">
  <div class="book-card" data-ol-key="{{ book.ol_key | default('') | e }}" data-title="{{ book.title | default('') | e }}" data-author="{{ book.author | default('') | e }}">
    {% if book.cover_url %}
    <div class="cover-skeleton"></div>
    <img src="{{ book.cover_url }}" alt="{{ book.title }}" loading="lazy" decoding="async" onload="this.classList.add('loaded')" onerror="this.style.display='none';this.parentNode.querySelector('.ph-fallback').style.display='flex';">
    <div class="placeholder ph-fallback" style="display:none">?</div>
    {% else %}
    <div class="placeholder">?</div>
    {% endif %}
    <div class="info">
      <div class="t">{{ book.title[:50] }}{% if book.title|length > 50 %}...{% endif %}</div>
      {% if book.author %}<div class="a">{{ book.author[:35] }}{% if book.author|length > 35 %}...{% endif %}</div>{% endif %}
    </div>
  </div>
</a>
